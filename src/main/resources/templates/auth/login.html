<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-5">

        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">EMS</h3>
            <p class="text-muted small">Employee Management System</p>
        </div>

        <div class="alert alert-danger d-flex align-items-center gap-2" th:if="${param.error}">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>Invalid email or password. Please try again.</span>
        </div>

        <div class="alert alert-success d-flex align-items-center gap-2" th:if="${param.logout}">
            <i class="bi bi-check-circle-fill"></i>
            <span>You have been signed out successfully.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label fw-medium">Email address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email"
                           id="email"
                           name="username"
                           class="form-control"
                           placeholder="you@company.com"
                           required
                           autofocus/>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-control"
                           placeholder="Enter Password"
                           required/>
                </div>
            </div>

            <div class="mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me"/>
                    <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
