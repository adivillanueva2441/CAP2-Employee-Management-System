<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width:220px; min-height:100vh;">
        <div class="mb-3 pb-3 border-bottom border-secondary">
            <span class="fs-5 fw-semibold">EMS</span>
            <div class="text-muted small">Employee Management</div>
        </div>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/employees.html" class="nav-link active text-white">
                    <i class="bi bi-people me-2"></i> Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/departments.html" class="nav-link text-secondary">
                    <i class="bi bi-diagram-3 me-2"></i> Departments
                </a>
            </li>
            <li class="nav-item">
                <a href="/reports.html" class="nav-link text-secondary">
                    <i class="bi bi-bar-chart me-2"></i> Reports
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
            <form action="/logout" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-semibold mb-0">Employees</h5>
                <small class="text-muted">Manage your workforce</small>
            </div>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
                <i class="bi bi-plus-lg me-1"></i> Add Employee
            </button>
        </div>

        <!-- Filter Card -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Department</label>
                        <select class="form-select form-select-sm" id="filterDept">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold">Minimum Age</label>
                        <input type="number" class="form-control form-control-sm" id="filterMinAge"
                               placeholder="e.g. 20" min="18" max="80"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold">Max Age</label>
                        <input type="number" class="form-control form-control-sm" id="filterMaxAge"
                               placeholder="e.g. 40" min="18" max="80"/>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-primary btn-sm w-100" id="applyFilterBtn">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-outline-secondary btn-sm w-100" id="clearFilterBtn">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Employee Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">Emp No.</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Date of Birth</th>
                        <th>Age</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-people fs-3 d-block mb-2 opacity-25"></i>
                            No employees to display.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Add Employee Modal -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-semibold">Add Employee</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-control-sm" id="fieldName" placeholder="e.g. Juan dela Cruz"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Department</label>
                    <select class="form-select form-select-sm" id="fieldDepartment">
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Date of Birth</label>
                    <input type="date" class="form-control form-control-sm" id="fieldDob"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Salary</label>
                    <input type="number" class="form-control form-control-sm" id="fieldSalary" placeholder="e.g. 55000" min="0" step="0.01"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="saveEmployeeBtn">Save Employee</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Employee Modal -->
<div class="modal fade" id="editEmployeeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-semibold">Edit Employee</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editEmployeeId"/>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-control-sm" id="editFieldName"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Department</label>
                    <select class="form-select form-select-sm" id="editFieldDepartment">
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Date of Birth</label>
                    <input type="date" class="form-control form-control-sm" id="editFieldDob"/>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Salary</label>
                    <input type="number" class="form-control form-control-sm" id="editFieldSalary" min="0" step="0.01"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="updateEmployeeBtn">Update Employee</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-body text-center py-4">
                <i class="bi bi-trash3 text-danger fs-2 d-block mb-3"></i>
                <h6 class="fw-semibold mb-1">Delete Employee</h6>
                <p class="text-muted small mb-0">Are you sure you want to delete <strong id="deleteEmployeeName"></strong>? This action cannot be undone.</p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
