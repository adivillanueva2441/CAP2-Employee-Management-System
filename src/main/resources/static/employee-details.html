<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Employee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width:220px; min-height:100vh;">
        <div class="mb-3 pb-3 border-bottom border-secondary">
            <span class="fs-5 fw-semibold">EMS</span>
            <div class="text-muted small">Employee Management</div>
        </div>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/employees.html" class="nav-link active text-white">
                    <i class="bi bi-people me-2"></i> Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/departments.html" class="nav-link text-secondary">
                    <i class="bi bi-diagram-3 me-2"></i> Departments
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
            <form action="/logout" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Page Header -->
        <div class="d-flex align-items-center mb-4">
            <a href="/employees.html" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h5 class="fw-semibold mb-0">Employee Details</h5>
                <small class="text-muted">Viewing employee information</small>
            </div>
        </div>

        <!-- Details Card -->
        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">

                <h6 class="fw-semibold mb-4" id="employeeName">—</h6>

                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="text-muted small fw-semibold">Employee Number</div>
                        <div class="mt-1" id="employeeNumber">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-muted small fw-semibold">Department</div>
                        <div class="mt-1" id="department">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-muted small fw-semibold">Date of Birth</div>
                        <div class="mt-1" id="dateOfBirth">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-muted small fw-semibold">Age</div>
                        <div class="mt-1" id="age">—</div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-muted small fw-semibold">Salary</div>
                        <div class="mt-1" id="salary">—</div>
                    </div>
                </div>

                <hr class="my-4"/>

                <div class="d-flex gap-2">
                    <a href="#" class="btn btn-primary btn-sm" id="editBtn">
                        <i class="bi bi-pencil me-1"></i> Edit
                    </a>
                    <button class="btn btn-outline-danger btn-sm" id="deleteBtn">
                        <i class="bi bi-trash me-1"></i> Delete
                    </button>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/employee-details.js"></script>
</body>
</html>
