<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Departments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width:220px; min-height:100vh;">
        <div class="mb-3 pb-3 border-bottom border-secondary">
            <span class="fs-5 fw-semibold">EMS</span>
            <div class="text-muted small">Employee Management</div>
        </div>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/employees.html" class="nav-link text-secondary">
                    <i class="bi bi-people me-2"></i> Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/departments.html" class="nav-link active text-white">
                    <i class="bi bi-diagram-3 me-2"></i> Departments
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
            <form action="/logout" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Alert -->
        <div id="alertBox" class="alert d-none alert-dismissible fade show" role="alert">
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="document.getElementById('alertBox').classList.add('d-none')"></button>
        </div>

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-semibold mb-0">Departments</h5>
                <small class="text-muted">Manage your departments</small>
            </div>
            <a href="/department-form.html" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i> Add Department
            </a>
        </div>

        <!-- Department Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Department Name</th>
                            <th>Employee Count</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="departmentTableBody">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-5">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                <small class="text-muted" id="paginationInfo"></small>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/constants.js"></script>
<script src="/js/departments.js"></script>
</body>
</html>
