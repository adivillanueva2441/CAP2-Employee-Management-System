<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width:220px; min-height:100vh;">
        <div class="mb-3 pb-3 border-bottom border-secondary">
            <span class="fs-5 fw-semibold">EMS</span>
            <div class="text-muted small">Employee Management</div>
        </div>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/employees.html" class="nav-link active text-white">
                    <i class="bi bi-people me-2"></i> Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/departments.html" class="nav-link text-secondary">
                    <i class="bi bi-diagram-3 me-2"></i> Departments
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
            <form action="/logout" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-semibold mb-0">Employees</h5>
                <small class="text-muted">Manage your workforce</small>
            </div>
            <div class="d-flex gap-2">
                <a href="/employee-form.html" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i> Add Employee
                </a>
                <a href="/api/reports/export/csv" class="btn btn-outline-success btn-sm">
                    <i class="bi bi-file-earmark-spreadsheet me-1"></i> Export Report
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="text-muted small fw-semibold">Total Employees</div>
                        <div class="fs-5 fw-semibold mt-1" id="statTotalEmployees">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="text-muted small fw-semibold">Total Departments</div>
                        <div class="fs-5 fw-semibold mt-1" id="statTotalDepartments">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="text-muted small fw-semibold">Average Salary</div>
                        <div class="fs-5 fw-semibold mt-1" id="statAvgSalary">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="text-muted small fw-semibold">Average Age</div>
                        <div class="fs-5 fw-semibold mt-1" id="statAvgAge">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Card -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Search</label>
                        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search for Employee Name"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Department</label>
                        <select class="form-select form-select-sm" id="filterDepartment">
                            <option value="">All Departments</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold">Minimum Age</label>
                        <input type="number" class="form-control form-control-sm" id="filterMinAge" placeholder="e.g. 20" min="18" max="80"
                                onkeydown="return !['e', 'E', '-', '+'].includes(event.key)"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold">Max Age</label>
                        <input type="number" class="form-control form-control-sm" id="filterMaxAge" placeholder="e.g. 40" min="18" max="80"
                                onkeydown="return !['e', 'E', '-', '+'].includes(event.key)"/>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-primary btn-sm w-100" id="applyFilterBtn">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-outline-secondary btn-sm w-100" id="clearFilterBtn">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
                <div id="filterError" class="text-danger small mt-2 d-none"></div>
            </div>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert d-none alert-dismissible fade show" role="alert">
            <span id="alertMessage"></span>
            <button type="button" class="btn-close" onclick="document.getElementById('alertBox').classList.add('d-none')"></button>
        </div>

        <!-- Employee Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3" data-sort="employeeNumber" onclick="sortBy('employeeNumber')" style="cursor:pointer;">
                                Emp No. <i class="bi bi-arrow-down-up text-muted small"></i>
                            </th>
                            <th data-sort="name" onclick="sortBy('name')" style="cursor:pointer;">
                                Name <i class="bi bi-arrow-down-up text-muted small"></i>
                            </th>
                            <th>Department</th>
                            <th data-sort="dateOfBirth" onclick="sortBy('dateOfBirth')" style="cursor:pointer;">
                                Date of Birth <i class="bi bi-arrow-down-up text-muted small"></i>
                            </th>
                            <th>Age</th>
                            <th data-sort="salary" onclick="sortBy('salary')" style="cursor:pointer;">
                                Salary <i class="bi bi-arrow-down-up text-muted small"></i>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-5">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                <small class="text-muted" id="paginationInfo"></small>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/employees.js"></script>
</body>
</html>
