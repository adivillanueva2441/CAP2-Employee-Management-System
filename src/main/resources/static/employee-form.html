<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EMS — Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 bg-dark text-white" style="width:220px; min-height:100vh;">
        <div class="mb-3 pb-3 border-bottom border-secondary">
            <span class="fs-5 fw-semibold">EMS</span>
            <div class="text-muted small">Employee Management</div>
        </div>
        <ul class="nav nav-pills flex-column mb-auto gap-1">
            <li class="nav-item">
                <a href="/employees.html" class="nav-link active text-white">
                    <i class="bi bi-people me-2"></i> Employees
                </a>
            </li>
            <li class="nav-item">
                <a href="/departments.html" class="nav-link text-secondary">
                    <i class="bi bi-diagram-3 me-2"></i> Departments
                </a>
            </li>
        </ul>
        <div class="mt-auto pt-3 border-top border-secondary">
            <form action="/logout" method="post">
                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

        <!-- Page Header -->
        <div class="d-flex align-items-center mb-4">
            <a href="/employees.html" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h5 class="fw-semibold mb-0" id="pageTitle">Add Employee</h5>
                <small class="text-muted" id="pageSubtitle">Fill in the details below</small>
            </div>
        </div>

        <!-- Form Card -->
        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">

                <!-- Error Alert -->
                <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>
                    <span id="errorMessage"></span>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Full Name
                        <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control form-control-sm" id="fieldName" placeholder="e.g. Juan dela Cruz" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Department
                        <span class="text-danger">*</span>
                    </label>
                    <select class="form-select form-select-sm" id="fieldDepartment" required>
                        <option value="">Select Department</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold">Date of Birth
                        <span class="text-danger">*</span>
                    </label>
                    <input type="date" class="form-control form-control-sm" id="fieldDob" required/>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold">Salary
                        <span class="text-danger">*</span>
                    </label>
                    <input type="number" class="form-control form-control-sm" id="fieldSalary" 
                        placeholder="e.g. 55000" min="0" step="0.01"
                        onkeydown="return !['e', 'E', '-', '+'].includes(event.key)"/>
                </div>

                <p class="text-muted small mt-3 mb-0">
                    <span class="text-danger">*</span> Required fields
                </p>
                <div class="d-flex gap-2 mt-4">
                    <button type="button" class="btn btn-primary btn-sm" id="saveBtn">
                        <i class="bi bi-check-lg me-1"></i> Save Employee
                    </button>
                    <a href="/employees.html" class="btn btn-outline-secondary btn-sm">
                        Cancel
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/constants.js"></script>
<script src="/js/employee-form.js"></script>
</body>
</html>
